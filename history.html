<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <title>History · Training Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); text-align: center; }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; }

    .controls { display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: center; margin-bottom: var(--space-4); }
    .controls .search { flex: 1; min-width: 200px; }
    .controls select { width: auto; }

    .filters { display: flex; gap: 8px; margin-bottom: var(--space-5); flex-wrap: wrap; }
    .chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: var(--radius-pill);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 550;
    }
    .chip:hover { color: var(--text); }
    .chip.is-active { background: var(--accent); border-color: var(--accent); color: var(--accent-contrast); }

    .program-grid { display: grid; gap: var(--space-3); }
    .program-card {
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--space-5);
    }
    .program-card:hover { border-color: var(--border-strong); }
    .program-card h3 { margin-bottom: 8px; }
    .program-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; font-size: 0.85rem; color: var(--text-muted); }
    .program-notes { margin-top: 10px; color: var(--text-muted); font-size: 0.88rem; }
    .program-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    @media (max-width: 640px) {
      .program-card { flex-direction: column; }
      .program-actions { flex-direction: row; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">TD</span>
        <span class="brand-name">Training Dashboard</span>
      </a>
      <nav class="appbar-nav">
        <a href="index.html">Dashboard</a>
        <a href="history.html">History</a>
      </nav>
    </div>
  </header>

  <main class="page page--wide">
    <div class="toolbar">
      <h1>History</h1>
      <div class="toolbar-spacer"></div>
      <button class="btn" id="exportBtn">Export backup</button>
      <button class="btn btn-ghost" id="importBtn">Import</button>
      <button class="btn btn-danger" id="clearBtn">Clear all</button>
    </div>

    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Programs</div></div>
      <div class="stat-card"><div class="stat-value" id="statStrength">0</div><div class="stat-label">Strength</div></div>
      <div class="stat-card"><div class="stat-value" id="statWeekly">0</div><div class="stat-label">Weekly</div></div>
      <div class="stat-card"><div class="stat-value" id="statHours">0h</div><div class="stat-label">Hours planned</div></div>
    </div>

    <div class="controls">
      <input class="search" type="search" id="searchInput" placeholder="Search by name or notes…" aria-label="Search programs">
      <select id="sortSelect" aria-label="Sort by">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="name">Name (A–Z)</option>
        <option value="type">Type</option>
      </select>
    </div>

    <div class="filters" id="filters">
      <button class="chip is-active" data-filter="all">All</button>
      <button class="chip" data-filter="strength">Strength</button>
      <button class="chip" data-filter="general">Weekly</button>
    </div>

    <div class="program-grid" id="programGrid"></div>
  </main>

  <input type="file" id="importFile" accept=".json,application/json" class="hidden">

  <script src="scripts/utils.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    const PAGE_FOR_TYPE = { strength: 'strength-template.html', general: 'weekly_training_program_template.html' };
    let currentFilter = 'all';

    function renderStats() {
      const stats = storage.getStats();
      document.getElementById('statTotal').textContent = stats.totalPrograms;
      document.getElementById('statStrength').textContent = stats.byType.strength || 0;
      document.getElementById('statWeekly').textContent = stats.byType.general || 0;
      document.getElementById('statHours').textContent = `${stats.totalHours.toFixed(1)}h`;
    }

    function visiblePrograms() {
      let programs = storage.getAllPrograms();

      if (currentFilter !== 'all') {
        programs = programs.filter((p) => (p.type || 'general') === currentFilter);
      }

      const term = document.getElementById('searchInput').value.trim().toLowerCase();
      if (term) {
        programs = programs.filter((p) =>
          [p.name, p.type, p.notes].some((v) => (v || '').toLowerCase().includes(term)));
      }

      const sort = document.getElementById('sortSelect').value;
      programs.sort((a, b) => {
        switch (sort) {
          case 'oldest': return (a.lastModified || 0) - (b.lastModified || 0);
          case 'name': return (a.name || '').localeCompare(b.name || '');
          case 'type': return (a.type || '').localeCompare(b.type || '');
          default: return (b.lastModified || 0) - (a.lastModified || 0);
        }
      });
      return programs;
    }

    function render() {
      renderStats();
      const grid = document.getElementById('programGrid');
      const programs = visiblePrograms();

      if (programs.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📭</div>
            <h2>No programs found</h2>
            <p>Try a different search or filter, or create one from the dashboard.</p>
          </div>`;
        return;
      }

      grid.innerHTML = programs.map((p) => {
        const type = p.type === 'strength' ? 'strength' : 'general';
        const typeLabel = type === 'strength' ? 'Strength' : 'Weekly';
        const notes = (p.notes || '').trim();
        return `
          <div class="program-card" data-id="${p.id}" data-type="${type}">
            <div>
              <h3>${sanitizeHTML(p.name || 'Untitled Program')}</h3>
              <span class="badge badge-${type}">${typeLabel}</span>
              ${p.weekNumber ? `<span class="badge">Week ${sanitizeHTML(p.weekNumber)}</span>` : ''}
              <div class="program-meta">
                <span>Updated ${formatDateReadable(p.lastModified)}</span>
                ${p.totalHours ? `<span>${sanitizeHTML(p.totalHours)}h planned</span>` : ''}
                ${p.startDate ? `<span>Starts ${formatDateReadable(p.startDate)}</span>` : ''}
              </div>
              ${notes ? `<p class="program-notes">${sanitizeHTML(notes.slice(0, 160))}${notes.length > 160 ? '…' : ''}</p>` : ''}
            </div>
            <div class="program-actions">
              <button class="btn btn-sm btn-primary" data-action="open">Open</button>
              <button class="btn btn-sm" data-action="duplicate">Duplicate</button>
              <button class="btn btn-sm btn-danger" data-action="delete">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      render();

      document.getElementById('searchInput').addEventListener('input', debounce(render, 200));
      document.getElementById('sortSelect').addEventListener('change', render);

      document.getElementById('filters').addEventListener('click', (e) => {
        const chip = e.target.closest('.chip');
        if (!chip) return;
        currentFilter = chip.dataset.filter;
        document.querySelectorAll('.chip').forEach((c) => c.classList.toggle('is-active', c === chip));
        render();
      });

      document.getElementById('programGrid').addEventListener('click', async (e) => {
        const card = e.target.closest('.program-card');
        const action = e.target.closest('[data-action]')?.dataset.action;
        if (!card || !action) return;
        const { id, type } = card.dataset;

        if (action === 'open') {
          window.location.href = `${PAGE_FOR_TYPE[type] || PAGE_FOR_TYPE.general}?id=${encodeURIComponent(id)}`;
        } else if (action === 'duplicate') {
          storage.duplicateProgram(id) ? showToast('Program duplicated', 'success') : showToast('Could not duplicate', 'error');
          render();
        } else if (action === 'delete') {
          if (await showConfirm('Delete this program? This cannot be undone.', { confirmLabel: 'Delete' })) {
            storage.deleteProgram(id);
            showToast('Program deleted', 'success');
            render();
          }
        }
      });

      document.getElementById('exportBtn').addEventListener('click', () => {
        downloadFile(storage.exportAll(), `training-programs-${formatDate(new Date())}.json`);
        showToast('Backup exported', 'success');
      });

      const fileInput = document.getElementById('importFile');
      document.getElementById('importBtn').addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const result = storage.importPrograms(reader.result, true);
          showToast(result.message, result.success ? 'success' : 'error');
          if (result.success) render();
        };
        reader.readAsText(file);
        e.target.value = '';
      });

      document.getElementById('clearBtn').addEventListener('click', async () => {
        if (!(await showConfirm('Delete ALL programs? This cannot be undone.', { confirmLabel: 'Delete all' }))) return;
        if (!(await showConfirm('This permanently removes every saved program. Are you sure?', { confirmLabel: 'Yes, delete everything' }))) return;
        storage.clearAllPrograms();
        showToast('All programs cleared', 'success');
        render();
      });
    });
  </script>
</body>
</html>
