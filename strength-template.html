<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <title>Strength Program · Training Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--space-4);
    }

    .day { margin-top: var(--space-4); }
    .day-head {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding-bottom: var(--space-3);
      margin-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
    }
    .day-head h3 { margin: 0; color: var(--accent); }
    .day-head .day-date { width: auto; }
    .day-head .count { color: var(--text-muted); font-size: 0.85rem; }
    .day-toggle {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      transition: transform var(--transition);
    }
    .day.collapsed .day-toggle { transform: rotate(-90deg); }
    .day.collapsed .day-body { display: none; }
    .day-head .export-day { margin-left: auto; }

    .item-list { display: flex; flex-direction: column; gap: 10px; }

    .exercise {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .exercise-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .exercise-top .exercise-name { font-weight: 600; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 8px; }
    .detail-grid label { margin-bottom: 3px; font-size: 0.75rem; }
    .detail-grid input { padding: 6px 8px; font-size: 0.9rem; }

    .group {
      background: var(--surface-2);
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      padding: 12px;
    }
    .group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .group-name { font-weight: 600; color: var(--accent); }
    .group-items { display: flex; flex-direction: column; gap: 10px; padding-left: 4px; }
    .group-actions { display: flex; gap: 6px; margin-left: auto; }

    .drag-handle {
      cursor: grab;
      color: var(--text-faint);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 4px;
      user-select: none;
      touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; }
    .dragging { opacity: 0.4; }

    .day-actions { display: flex; gap: 8px; margin-top: 12px; }

    @media (max-width: 640px) {
      .group-actions { margin-left: 0; }
      .group-head { flex-wrap: wrap; }
    }

    /* Printing the whole program: expand collapsed days, hide editing chrome. */
    @media print {
      .day.collapsed .day-body { display: block !important; }
      .day-toggle, .day-actions, .export-day, .drag-handle,
      .group-actions, .exercise-top .btn-danger { display: none !important; }
      .day { break-inside: avoid; page-break-inside: avoid; }
      .exercise { border-left-color: #999; }
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">TD</span>
        <span class="brand-name">Training Dashboard</span>
      </a>
      <nav class="appbar-nav">
        <a href="index.html">Dashboard</a>
        <a href="history.html">History</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="toolbar">
      <a class="btn btn-ghost" href="index.html">← Dashboard</a>
      <button class="btn btn-primary" id="saveBtn">Save</button>
      <button class="btn" id="printBtn">Print all</button>
      <div class="toolbar-spacer"></div>
      <span class="save-status" id="saveStatus" data-state="saved">Saved</span>
    </div>

    <div id="capture" class="stack">
      <section class="card">
        <h1 style="margin-bottom: var(--space-4);">Strength Training Program</h1>
        <div class="meta-grid">
          <div class="field">
            <label for="programName">Program name</label>
            <input type="text" id="programName" placeholder="e.g. Winter Strength Phase">
          </div>
          <div class="field">
            <label for="trainingPhase">Training phase</label>
            <input type="text" id="trainingPhase" placeholder="e.g. Hypertrophy">
          </div>
          <div class="field">
            <label for="weekNumber">Week #</label>
            <input type="number" id="weekNumber" placeholder="1" min="0">
          </div>
          <div class="field">
            <label for="startDate">From</label>
            <input type="date" id="startDate">
          </div>
          <div class="field">
            <label for="endDate">To</label>
            <input type="date" id="endDate">
          </div>
        </div>
      </section>

      <div id="workoutDays"></div>

      <section class="card">
        <label for="programNotes">Program notes &amp; guidelines</label>
        <textarea id="programNotes" rows="4" placeholder="Technical cues, progression notes, warm-up protocol…"></textarea>
      </section>
    </div>
  </main>

  <script src="vendor/html2canvas.min.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    const WORKOUT_DAYS = ['Tuesday', 'Thursday', 'Friday'];
    let programId = null;
    let autosave = null;

    const dayId = (day) => day.toLowerCase().replace(/\s+/g, '-');

    /* ---------- Templates ---------- */
    function exerciseHTML(ex = {}) {
      const id = ex.id || generateUUID();
      const val = (v) => sanitizeHTML(v || '');
      return `
        <div class="exercise" data-item="exercise" data-id="${id}">
          <div class="exercise-top">
            <span class="drag-handle" draggable="true" title="Drag to reorder">⠿</span>
            <input type="text" class="exercise-name f-name" placeholder="Exercise name…" value="${val(ex.name)}">
            <button class="btn btn-sm btn-danger" data-action="remove-exercise">Remove</button>
          </div>
          <div class="detail-grid">
            <div><label>Sets</label><input type="text" class="f-sets" placeholder="3-4" value="${val(ex.sets)}"></div>
            <div><label>Reps</label><input type="text" class="f-reps" placeholder="8-12" value="${val(ex.reps)}"></div>
            <div><label>Load</label><input type="text" class="f-weight" placeholder="70%" value="${val(ex.weight)}"></div>
            <div><label>Tempo</label><input type="text" class="f-tempo" placeholder="3-1-1-0" value="${val(ex.tempo)}"></div>
            <div><label>Notes</label><input type="text" class="f-notes" placeholder="Optional" value="${val(ex.notes)}"></div>
          </div>
        </div>`;
    }

    function groupHTML(group = {}) {
      const id = group.id || generateUUID();
      const inner = (group.exercises || []).map(exerciseHTML).join('');
      return `
        <div class="group" data-item="group" data-id="${id}">
          <div class="group-head">
            <span class="drag-handle" draggable="true" title="Drag to reorder">⠿</span>
            <input type="text" class="group-name" placeholder="Superset A" value="${sanitizeHTML(group.name || '')}">
            <div class="group-actions">
              <button class="btn btn-sm" data-action="add-to-group">+ Exercise</button>
              <button class="btn btn-sm btn-danger" data-action="remove-group">Delete</button>
            </div>
          </div>
          <div class="group-items">${inner}</div>
        </div>`;
    }

    function dayHTML(day, items) {
      return `
        <section class="card day" data-day="${day}">
          <div class="day-head">
            <button class="day-toggle" data-action="toggle-day" aria-label="Collapse day">▾</button>
            <h3>${day}</h3>
            <input type="date" class="day-date">
            <span class="count"><span class="count-n">0</span> exercises</span>
            <button class="btn btn-sm export-day" data-action="export-day" title="Export this day as an image">Export day</button>
          </div>
          <div class="day-body">
            <div class="item-list">${items.map((it) => (it.type === 'group' ? groupHTML(it) : exerciseHTML(it))).join('')}</div>
            <div class="day-actions">
              <button class="btn btn-sm btn-primary" data-action="add-exercise">+ Exercise</button>
              <button class="btn btn-sm" data-action="add-group">+ Group</button>
            </div>
          </div>
        </section>`;
    }

    /* ---------- Build & hydrate ---------- */
    function build(data) {
      const container = document.getElementById('workoutDays');
      container.innerHTML = WORKOUT_DAYS.map((day) => {
        const stored = data?.days?.[day];
        let items = [];
        if (stored?.items) items = stored.items;
        else if (stored?.exercises) items = stored.exercises.map((ex) => ({ type: 'exercise', ...ex })); // legacy
        return dayHTML(day, items);
      }).join('');

      // Restore per-day dates.
      WORKOUT_DAYS.forEach((day) => {
        const date = data?.days?.[day]?.date;
        if (date) container.querySelector(`[data-day="${day}"] .day-date`).value = date;
      });

      WORKOUT_DAYS.forEach((day) => updateCount(day));
      restoreCollapsed();
      initAutoResizeTextareas();
    }

    function updateCount(day) {
      const card = document.querySelector(`[data-day="${day}"]`);
      if (!card) return;
      card.querySelector('.count-n').textContent = card.querySelectorAll('.exercise').length;
    }
    function updateAllCounts() { WORKOUT_DAYS.forEach(updateCount); }

    /* ---------- Collapse state ---------- */
    const collapseKey = () => `program-${programId}-collapsed`;
    function saveCollapsed() {
      const days = [...document.querySelectorAll('.day.collapsed')].map((d) => d.dataset.day);
      try { localStorage.setItem(collapseKey(), JSON.stringify(days)); } catch {}
    }
    function restoreCollapsed() {
      try {
        const days = JSON.parse(localStorage.getItem(collapseKey()) || '[]');
        days.forEach((day) => document.querySelector(`[data-day="${day}"]`)?.classList.add('collapsed'));
      } catch {}
    }

    /* ---------- Serialise ---------- */
    function readExercise(el) {
      return {
        type: 'exercise',
        id: el.dataset.id,
        name: el.querySelector('.f-name').value,
        sets: el.querySelector('.f-sets').value,
        reps: el.querySelector('.f-reps').value,
        weight: el.querySelector('.f-weight').value,
        tempo: el.querySelector('.f-tempo').value,
        notes: el.querySelector('.f-notes').value,
      };
    }

    function getData() {
      const days = {};
      document.querySelectorAll('.day').forEach((card) => {
        const items = [];
        card.querySelector('.item-list').querySelectorAll(':scope > [data-item]').forEach((node) => {
          if (node.dataset.item === 'group') {
            items.push({
              type: 'group',
              id: node.dataset.id,
              name: node.querySelector('.group-name').value,
              exercises: [...node.querySelectorAll('.exercise')].map((ex) => {
                const e = readExercise(ex);
                delete e.type;
                return e;
              }),
            });
          } else {
            items.push(readExercise(node));
          }
        });
        days[card.dataset.day] = { date: card.querySelector('.day-date').value, items };
      });

      return {
        id: programId,
        type: 'strength',
        name: document.getElementById('programName').value || 'Untitled Strength Program',
        trainingPhase: document.getElementById('trainingPhase').value,
        weekNumber: document.getElementById('weekNumber').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        notes: document.getElementById('programNotes').value,
        days,
      };
    }

    function hydrateMeta(data) {
      document.getElementById('programName').value = data.name || '';
      document.getElementById('trainingPhase').value = data.trainingPhase || '';
      document.getElementById('weekNumber').value = data.weekNumber || '';
      document.getElementById('startDate').value = data.startDate || '';
      document.getElementById('endDate').value = data.endDate || '';
      document.getElementById('programNotes').value = data.notes || '';
    }

    /* ---------- Drag & drop (handle-initiated, live reorder) ---------- */
    function getDragAfter(container, y) {
      const items = [...container.children].filter((c) => c.matches('[data-item]') && !c.classList.contains('dragging'));
      let closest = { offset: -Infinity, el: null };
      for (const child of items) {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) closest = { offset, el: child };
      }
      return closest.el;
    }

    function initDragAndDrop() {
      const root = document.getElementById('workoutDays');
      let dragged = null;

      root.addEventListener('dragstart', (e) => {
        const handle = e.target.closest('.drag-handle');
        if (!handle) return;
        dragged = handle.closest('[data-item]');
        if (!dragged) return;
        dragged.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragged.dataset.id);
        try { e.dataTransfer.setDragImage(dragged, 12, 12); } catch {}
      });

      root.addEventListener('dragover', (e) => {
        if (!dragged) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const isGroup = dragged.dataset.item === 'group';
        let list = e.target.closest('.group-items, .item-list');
        if (!list) return;
        // Groups live only at the top level; redirect into the day's item list.
        if (isGroup) list = list.closest('.item-list');
        if (!list) return;

        const after = getDragAfter(list, e.clientY);
        if (after == null) list.appendChild(dragged);
        else list.insertBefore(dragged, after);
      });

      root.addEventListener('drop', (e) => { if (dragged) e.preventDefault(); });

      root.addEventListener('dragend', () => {
        if (!dragged) return;
        dragged.classList.remove('dragging');
        dragged = null;
        updateAllCounts();
        autosave.markDirty();
      });
    }

    /* ---------- Structural actions ---------- */
    function handleAction(action, target) {
      const day = target.closest('.day');
      switch (action) {
        case 'add-exercise':
          day.querySelector('.item-list').insertAdjacentHTML('beforeend', exerciseHTML());
          break;
        case 'add-group':
          day.querySelector('.item-list').insertAdjacentHTML('beforeend', groupHTML());
          break;
        case 'add-to-group':
          target.closest('.group').querySelector('.group-items').insertAdjacentHTML('beforeend', exerciseHTML());
          break;
        case 'remove-exercise':
          target.closest('.exercise').remove();
          break;
        case 'remove-group':
          target.closest('.group').remove();
          break;
        case 'toggle-day':
          day.classList.toggle('collapsed');
          saveCollapsed();
          return; // no data change
        default:
          return;
      }
      updateAllCounts();
      autosave.markDirty();
    }

    /* ---------- Per-day image export ----------
     * We rasterise a purpose-built, self-contained node (plain colours, a
     * simple table) rather than the live dark-themed DOM. That keeps the
     * output crisp and consistent regardless of the app's styling. */
    function buildDayExportNode(dayName, day, meta) {
      const esc = sanitizeHTML;
      const cell = 'padding:7px 10px;border:1px solid #e2e2e2;font-size:13px;vertical-align:top;';
      const num = `${cell}text-align:center;`;
      const head = 'padding:7px 10px;border:1px solid #e2e2e2;font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:#666;background:#f4f4f4;text-align:left;';

      const exRow = (ex, inGroup) => `
        <tr>
          <td style="${cell}${inGroup ? 'padding-left:26px;' : ''}font-weight:600;">${esc(ex.name) || '—'}</td>
          <td style="${num}">${esc(ex.sets)}</td>
          <td style="${num}">${esc(ex.reps)}</td>
          <td style="${num}">${esc(ex.weight)}</td>
          <td style="${num}">${esc(ex.tempo)}</td>
          <td style="${cell}">${esc(ex.notes)}</td>
        </tr>`;

      let body = '';
      (day.items || []).forEach((item) => {
        if (item.type === 'group') {
          body += `<tr><td colspan="6" style="padding:8px 10px;border:1px solid #e2e2e2;background:#fff7ea;color:#9a6100;font-weight:700;font-size:12px;">${esc(item.name) || 'Group'}</td></tr>`;
          (item.exercises || []).forEach((ex) => { body += exRow(ex, true); });
        } else {
          body += exRow(item, false);
        }
      });
      if (!body) body = `<tr><td colspan="6" style="${cell}text-align:center;color:#888;">No exercises for this day.</td></tr>`;

      const metaBits = [
        meta.trainingPhase && `Phase: ${esc(meta.trainingPhase)}`,
        meta.weekNumber && `Week ${esc(meta.weekNumber)}`,
      ].filter(Boolean).join('&nbsp;&nbsp;·&nbsp;&nbsp;');
      const dateStr = day.date ? formatDateReadable(day.date) : '';

      const node = document.createElement('div');
      node.style.cssText = 'position:fixed;left:-10000px;top:0;width:760px;padding:28px;background:#fff;color:#161616;font-family:Arial,Helvetica,sans-serif;box-sizing:border-box;';
      node.innerHTML = `
        <div style="border-bottom:3px solid #f59e0b;padding-bottom:10px;margin-bottom:16px;">
          <div style="font-size:20px;font-weight:800;">${esc(meta.name) || 'Strength Program'}</div>
          ${metaBits ? `<div style="font-size:12px;color:#666;margin-top:3px;">${metaBits}</div>` : ''}
        </div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
          <div style="font-size:17px;font-weight:700;color:#b5730a;">${esc(dayName)}</div>
          ${dateStr ? `<div style="font-size:13px;color:#666;">${dateStr}</div>` : ''}
        </div>
        <table style="width:100%;border-collapse:collapse;">
          <thead><tr>
            <th style="${head}">Exercise</th>
            <th style="${head}text-align:center;width:52px;">Sets</th>
            <th style="${head}text-align:center;width:60px;">Reps</th>
            <th style="${head}text-align:center;width:64px;">Load</th>
            <th style="${head}text-align:center;width:78px;">Tempo</th>
            <th style="${head}">Notes</th>
          </tr></thead>
          <tbody>${body}</tbody>
        </table>`;
      return node;
    }

    async function exportDay(dayName) {
      const data = getData();
      const day = data.days[dayName] || { date: '', items: [] };
      const node = buildDayExportNode(dayName, day, data);
      document.body.appendChild(node);
      try {
        const canvas = await html2canvas(node, { backgroundColor: '#ffffff', scale: 2, logging: false });
        const base = (data.name || 'strength-program').trim().replace(/\s+/g, '-');
        const link = document.createElement('a');
        link.download = `${base}-${dayName}-${formatDate(new Date())}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast(`${dayName} exported`, 'success');
      } catch (err) {
        console.error('Export failed:', err);
        showToast('Export failed', 'error');
      } finally {
        node.remove();
      }
    }

    /* ---------- Init ---------- */
    document.addEventListener('DOMContentLoaded', () => {
      programId = getQueryParam('id') || generateUUID();
      const existing = storage.getProgram(programId);

      if (existing) { hydrateMeta(existing); build(existing); }
      else { build(null); }

      autosave = createAutosave({ getData, statusEl: document.getElementById('saveStatus') });
      autosave.markClean();

      initDragAndDrop();

      const root = document.getElementById('workoutDays');
      root.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        if (btn.dataset.action === 'export-day') {
          exportDay(btn.closest('.day').dataset.day);
          return;
        }
        handleAction(btn.dataset.action, btn);
      });

      // Any text change marks the program dirty (debounced save handled centrally).
      document.querySelector('main').addEventListener('input', (e) => {
        if (e.target.matches('input, textarea')) autosave.markDirty();
      });

      document.getElementById('saveBtn').addEventListener('click', () => autosave.save(true));
      document.getElementById('printBtn').addEventListener('click', () => window.print());
    });
  </script>
</body>
</html>
