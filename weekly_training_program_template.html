<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f59e0b">
  <title>Weekly Training · Training Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .doc-title { text-align: center; margin-bottom: var(--space-5); }
    .doc-title h1 { font-size: 1.3rem; letter-spacing: 0.04em; }

    .cycle-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-5); }

    .week-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .summary-cell { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; }
    .summary-cell label { margin-bottom: 4px; }
    .summary-cell input { background: transparent; border: none; padding: 0; font-size: 1.05rem; font-weight: 600; }
    .summary-cell input[readonly] { color: var(--accent); }

    .schedule-wrap { overflow-x: auto; }
    table.schedule { width: 100%; border-collapse: collapse; min-width: 720px; }
    table.schedule th, table.schedule td { border: 1px solid var(--border); padding: 4px; vertical-align: middle; }
    table.schedule th { background: var(--surface-3); font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-align: left; padding: 8px; }
    table.schedule td input, table.schedule td textarea {
      border: none; background: transparent; padding: 6px; border-radius: 4px; font-size: 0.9rem;
    }
    table.schedule td input:focus, table.schedule td textarea:focus { background: var(--surface-2); box-shadow: none; }
    table.schedule textarea { min-height: 38px; resize: vertical; }
    .col-day { width: 90px; }
    .col-num { width: 44px; }
    .col-time { width: 96px; }
    .col-mins { width: 64px; }
    .col-date { width: 130px; }
    td.day-cell { background: var(--surface-2); font-weight: 600; }
    td.day-cell input { font-weight: 600; }
    /* hide number spinners */
    input[type="number"] { -moz-appearance: textfield; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    @media print {
      table.schedule { min-width: 0; font-size: 11px; }
      table.schedule th, table.schedule td { border-color: #000; }
      .summary-cell, .card { border-color: #999; }
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">TD</span>
        <span class="brand-name">Training Dashboard</span>
      </a>
      <nav class="appbar-nav">
        <a href="index.html">Dashboard</a>
        <a href="history.html">History</a>
      </nav>
    </div>
  </header>

  <main class="page page--wide">
    <div class="toolbar">
      <a class="btn btn-ghost" href="index.html">← Dashboard</a>
      <button class="btn btn-primary" id="saveBtn">Save</button>
      <button class="btn" id="exportBtn">Export image</button>
      <button class="btn" id="printBtn">Print</button>
      <div class="toolbar-spacer"></div>
      <span class="save-status" id="saveStatus" data-state="saved">Saved</span>
    </div>

    <div id="capture" class="card">
      <div class="doc-title"><h1>DOCTOR'S PRESCRIPTION PROGRAM</h1></div>

      <div class="cycle-grid">
        <div class="field"><label for="macroCycle">Macro-cycle</label><input type="text" id="macroCycle" placeholder="Prep"></div>
        <div class="field"><label for="mesoCycle">Meso-cycle</label><input type="text" id="mesoCycle" placeholder="Spec Prep"></div>
        <div class="field"><label for="weekTitle">Week title</label><input type="text" id="weekTitle" placeholder="e.g. Base Building Week"></div>
      </div>

      <div class="week-summary">
        <div class="summary-cell"><label>Week #</label><input type="number" id="weekNumber" placeholder="17" min="0"></div>
        <div class="summary-cell"><label>From</label><input type="date" id="startDate" readonly></div>
        <div class="summary-cell"><label>To</label><input type="date" id="endDate" readonly></div>
        <div class="summary-cell"><label>Total minutes</label><input type="number" id="totalMinutes" readonly></div>
        <div class="summary-cell"><label>Total hours</label><input type="number" id="totalHours" readonly></div>
      </div>

      <div class="schedule-wrap">
        <table class="schedule">
          <thead>
            <tr>
              <th class="col-date">Date</th>
              <th class="col-day">Day</th>
              <th class="col-num">#</th>
              <th class="col-time">Start</th>
              <th>Training model</th>
              <th>Comments / objective</th>
              <th class="col-mins">Mins</th>
            </tr>
          </thead>
          <tbody id="scheduleBody"></tbody>
        </table>
      </div>

      <section style="margin-top: var(--space-5);">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="3" placeholder="Notes, technical focus, and other details…"></textarea>
      </section>
    </div>
  </main>

  <script src="vendor/html2canvas.min.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/app.js"></script>
  <script>
    let programId = null;
    let autosave = null;

    // Seven days, two sessions each. Placeholders preserve the original
    // domain examples and are display-only (never saved).
    const DAY_TEMPLATE = [
      ['Monday',    [['C4 Primary Session', '40//20s, 4x2k, island loops, etc.', ''], ['Hydro Hill', "60' Hill Repeats", '60']]],
      ['Tuesday',   [['Long C6', "2-3x6k, 2x8k, 2x45', etc. w/ some tech work", ''], ['Strength', 'Tuesday BSPC Program', '60']]],
      ['Wednesday', [['Spine Health and Hip Mobility', 'BSPC Program', '30'], ['OFF', 'OFF', '']]],
      ['Thursday',  [['C5 Medium Duration', "3x4k, Island loops (3x), 3x20', 2x30', etc.", ''], ['Strength', 'Thursday BSPC Program', '60']]],
      ['Friday',    [['C6 Steady', 'Some rolling drills, mostly continuous 18-20', ''], ['Strength', 'Friday BSPC Program', '60']]],
      ['Saturday',  [['C2/1', '4x750, Omnium, 2x1500, 6-8x500, etc.', ''], ['C6 XT', 'Adjust volume based on weekly targets; cut if necessary', '']]],
      ['Sunday',    [['Trail Run', 'Trip n Fall', ''], ['C6 Row/Tech', 'Technical; low load. Adjust volume to fit weekly goal', '']]],
    ];

    function buildSchedule() {
      const rows = [];
      DAY_TEMPLATE.forEach(([day, sessions]) => {
        sessions.forEach(([training, comments, mins], s) => {
          const first = s === 0;
          rows.push(`
            <tr data-day="${day}">
              ${first ? `<td class="col-date" rowspan="2"><input type="date" class="f-date"></td>
                         <td class="day-cell col-day" rowspan="2"><input type="text" class="f-day" value="${day}"></td>` : ''}
              <td class="col-num"><input type="number" class="f-session" value="${s + 1}" min="1"></td>
              <td class="col-time"><input type="time" class="f-time"></td>
              <td><input type="text" class="f-training" placeholder="${sanitizeHTML(training)}"></td>
              <td><textarea class="f-comments" placeholder="${sanitizeHTML(comments)}"></textarea></td>
              <td class="col-mins"><input type="number" class="f-minutes" placeholder="${mins}" min="0"></td>
            </tr>`);
        });
      });
      document.getElementById('scheduleBody').innerHTML = rows.join('');
    }

    const rowEls = () => [...document.querySelectorAll('#scheduleBody tr')];

    function calcTotals() {
      const total = rowEls().reduce((sum, row) => sum + (parseFloat(row.querySelector('.f-minutes').value) || 0), 0);
      document.getElementById('totalMinutes').value = total || '';
      document.getElementById('totalHours').value = total ? (total / 60).toFixed(1) : '';
    }

    function calcRange() {
      const dates = rowEls().map((r) => r.querySelector('.f-date')?.value).filter(Boolean).sort();
      document.getElementById('startDate').value = dates[0] || '';
      document.getElementById('endDate').value = dates[dates.length - 1] || '';
    }

    function buildName() {
      const week = document.getElementById('weekNumber').value.trim();
      const title = document.getElementById('weekTitle').value.trim();
      if (week && title) return `Week ${week}: ${title}`;
      if (week) return `Weekly Training Program — Week ${week}`;
      if (title) return `Weekly Training Program — ${title}`;
      return 'Weekly Training Program';
    }

    function getData() {
      const sessions = rowEls().map((row, i) => {
        const first = i % 2 === 0;
        return {
          day: first ? row.querySelector('.f-day').value : '',
          date: first ? row.querySelector('.f-date').value : '',
          session: row.querySelector('.f-session').value,
          time: row.querySelector('.f-time').value,
          trainingModel: row.querySelector('.f-training').value,
          comments: row.querySelector('.f-comments').value,
          minutes: row.querySelector('.f-minutes').value,
        };
      });

      return {
        id: programId,
        type: 'general',
        name: buildName(),
        macroCycle: document.getElementById('macroCycle').value,
        mesoCycle: document.getElementById('mesoCycle').value,
        weekNumber: document.getElementById('weekNumber').value,
        weekTitle: document.getElementById('weekTitle').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        totalMinutes: document.getElementById('totalMinutes').value,
        totalHours: document.getElementById('totalHours').value,
        notes: document.getElementById('notes').value,
        sessions,
      };
    }

    function hydrate(data) {
      if (!data) return;
      document.getElementById('macroCycle').value = data.macroCycle || '';
      document.getElementById('mesoCycle').value = data.mesoCycle || '';
      document.getElementById('weekNumber').value = data.weekNumber || '';
      document.getElementById('weekTitle').value = data.weekTitle || '';
      document.getElementById('notes').value = data.notes || '';

      const rows = rowEls();
      (data.sessions || []).forEach((session, i) => {
        const row = rows[i];
        if (!row) return;
        const first = i % 2 === 0;
        if (first) {
          if (session.date) row.querySelector('.f-date').value = session.date;
          if (session.day) row.querySelector('.f-day').value = session.day;
        }
        if (session.session) row.querySelector('.f-session').value = session.session;
        if (session.time) row.querySelector('.f-time').value = session.time;
        if (session.trainingModel) row.querySelector('.f-training').value = session.trainingModel;
        if (session.comments) row.querySelector('.f-comments').value = session.comments;
        if (session.minutes) row.querySelector('.f-minutes').value = session.minutes;
      });
    }

    async function exportImage() {
      const toolbar = document.querySelector('.toolbar');
      toolbar.style.visibility = 'hidden';
      try {
        const canvas = await html2canvas(document.getElementById('capture'), {
          backgroundColor: getComputedStyle(document.body).backgroundColor,
          scale: 2,
          logging: false,
        });
        const link = document.createElement('a');
        const week = document.getElementById('weekNumber').value || 'week';
        link.download = `training-week-${week}-${formatDate(new Date())}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('Image exported', 'success');
      } catch (err) {
        console.error('Export failed:', err);
        showToast('Image export failed', 'error');
      } finally {
        toolbar.style.visibility = '';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      buildSchedule();

      programId = getQueryParam('id') || generateUUID();
      const existing = storage.getProgram(programId);
      if (existing) hydrate(existing);

      calcTotals();
      calcRange();
      initAutoResizeTextareas();

      autosave = createAutosave({ getData, statusEl: document.getElementById('saveStatus') });
      autosave.markClean();

      document.querySelector('main').addEventListener('input', (e) => {
        if (e.target.classList.contains('f-minutes')) calcTotals();
        if (e.target.classList.contains('f-date')) calcRange();
        if (e.target.matches('input, textarea')) autosave.markDirty();
      });

      document.getElementById('saveBtn').addEventListener('click', () => autosave.save(true));
      document.getElementById('exportBtn').addEventListener('click', exportImage);
      document.getElementById('printBtn').addEventListener('click', () => window.print());
    });
  </script>
</body>
</html>
